[project]
name = "vera-app"
version = "0.1.0"
description = "Python sidecar for the VERA desktop app"
readme = "../../README.md"
requires-python = ">=3.10"
dependencies = [
  "vera-doc",
]
authors = [{name = "Kyle Willis"}]
license = {text = "Apache-2.0"}
keywords = ["semantic-search", "document", "sqlite", "desktop"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Topic :: Text Processing :: Indexing",
]

[project.scripts]
vera-app-sidecar = "vera_app.sidecar:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vera_app"]
